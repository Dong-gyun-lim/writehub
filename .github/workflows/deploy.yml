name: Deploy to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'build.gradle'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Java 21 설치
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Gradle 빌드
        run: ./gradlew bootJar --no-daemon

      - name: jar 파일 EC2로 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/writehub-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/"

      - name: EC2 서버 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            kill $(lsof -t -i:8080) 2>/dev/null || true
            sleep 3
            nohup java -jar /home/ec2-user/build/libs/writehub-0.0.1-SNAPSHOT.jar --spring.config.location=file:/home/ec2-user/application.yml > /home/ec2-user/app.log 2>&1 &
            sleep 5
            echo "배포 완료!"